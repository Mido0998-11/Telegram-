<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔱 Wizzy Sovereign | TikTok</title>
    
    <style>
        body {
            background-color: #000 !important;
            color: #ffffff !important;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* حاوية السيادة - تصميم كرتوني واقعي (Hard Borders) */
        .main-box {
            background: #0f0f0f;
            border: 4px solid #1a1a1a;
            border-radius: 30px;
            padding: 40px 20px;
            width: 100%;
            max-width: 500px;
            margin-top: 50px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
        }

        /* خط النيون المتوهج - Khartoum Ash Style */
        .main-box::after {
            content: ''; position: absolute; inset: -4px; padding: 4px; border-radius: 30px;
            background: linear-gradient(90deg, #00f2ea, #ff0050, #00f2ea);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude; background-size: 200% auto; animation: beam 3s linear infinite;
            pointer-events: none;
        }
        @keyframes beam { to { background-position: 200% center; } }

        h1 {
            font-size: 3rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            font-weight: 900;
            color: #ff0050;
            letter-spacing: -2px;
        }

        .sub-text {
            color: #555;
            font-weight: bold;
            font-size: 10px;
            letter-spacing: 5px;
            margin-bottom: 30px;
        }

        input {
            width: 80%;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #333;
            background: #1a1a1a;
            color: #00f2ea;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
        }

        /* زر الإمبراطورية العظيم */
        .btn-action {
            width: 90%;
            padding: 20px;
            border-radius: 15px;
            background: linear-gradient(45deg, #ff0050, #ff4d4d);
            color: white;
            font-size: 1.5rem;
            font-weight: 900;
            border: none;
            box-shadow: 0 6px 0 #800028;
            cursor: pointer;
            transition: 0.1s;
        }
        .btn-action:active { transform: translateY(3px); box-shadow: 0 3px 0 #800028; }

        /* منطقة النتائج */
        #result-box {
            display: none;
            margin-top: 30px;
            width: 100%;
        }

        .cover-img {
            width: 100%;
            border-radius: 20px;
            border: 2px solid #222;
            margin-bottom: 20px;
        }

        .dl-link {
            display: block;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 900;
            color: black;
        }

        .bg-cyan { background-color: #00f2ea; }
        .bg-white { background-color: #fff; }

        .footer-text {
            margin-top: 50px;
            color: #333;
            font-weight: 900;
            font-size: 14px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="main-box">
        <h1>WIZZY</h1>
        <div class="sub-text">SOVEREIGN EMPIRE</div>

        <input type="text" id="url" placeholder="أدخل الرابط هنا...">
        <button onclick="startDownload()" class="btn-action">استخراج القوة 🔱</button>

        <div id="result-box">
            <img id="cover" class="cover-img" src="">
            <a id="hd-link" class="dl-link bg-cyan" href="#">تحميل فيديو HD 🎥</a>
            <a id="mp3-link" class="dl-link bg-white" href="#">تحميل صوت MP3 🎵</a>
        </div>
    </div>

    <div class="footer-text">DESIGNED BY WIZZY © 2026</div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        async function startDownload() {
            const val = document.getElementById('url').value;
            if(!val) return;

            // إظهار تنبيه بسيط
            if(window.Swal) {
                Swal.fire({ title: 'جاري العمل...', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#000', color: '#fff' });
            }

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: val})
                });
                const res = await response.json();
                
                if(res.success) {
                    document.getElementById('result-box').style.display = 'block';
                    document.getElementById('cover').src = res.data.cover;
                    document.getElementById('hd-link').href = `/proxy_download?url=${encodeURIComponent(res.data.hdplay || res.data.play)}&name=Wizzy.mp4`;
                    document.getElementById('mp3-link').href = `/proxy_download?url=${encodeURIComponent(res.data.music)}&name=Wizzy.mp3`;
                    if(window.Swal) Swal.close();
                } else {
                    alert("فشل الاستخراج، تأكد من الرابط");
                }
            } catch(e) {
                alert("حدث خطأ في الاتصال بالسيرفر");
            }
        }
    </script>
</body>
</html>
