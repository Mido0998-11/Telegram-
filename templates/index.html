<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔱 Wizzy Sovereign | الإمبراطورية العالمية</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        body { 
            background: #020617; 
            color: #f8fafc; 
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
        }

        /* Moving Background Effect */
        .bg-mesh {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 100%);
            z-index: -1;
        }

        .glass { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        .btn-sovereign {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-sovereign:hover {
            transform: scale(1.02) translateY(-3px);
            box-shadow: 0 15px 30px rgba(139, 92, 246, 0.4);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
    <div class="bg-mesh"></div>

    <div class="w-full max-w-2xl z-10">
        
        <div class="text-center mb-10 animate__animated animate__fadeInDown">
            <h1 class="text-6xl font-black tracking-tighter mb-2 italic">
                <span class="text-blue-500">WIZZY</span> <span class="text-white">SOVEREIGN</span>
            </h1>
            <div class="flex items-center justify-center gap-2">
                <span class="h-[1px] w-12 bg-blue-500"></span>
                <p class="text-gray-400 font-bold text-xs tracking-[0.5em] uppercase">V40.0 God-Tier</p>
                <span class="h-[1px] w-12 bg-blue-500"></span>
            </div>
        </div>

        <div class="glass p-8 rounded-[3rem] mb-8 animate__animated animate__zoomIn">
            <div class="relative mb-6">
                <i class="fa-solid fa-link absolute right-5 top-1/2 -translate-y-1/2 text-blue-500"></i>
                <input type="text" id="url" placeholder="انسخ الرابط الملكي هنا..." 
                       class="w-full p-5 pr-14 rounded-2xl bg-black/40 border border-white/5 focus:border-blue-500 outline-none text-lg font-bold transition-all text-center">
            </div>
            
            <button onclick="getDownload()" id="btn" class="w-full btn-sovereign p-5 rounded-2xl font-black text-xl flex items-center justify-center gap-3">
                <i class="fa-solid fa-bolt-lightning"></i>
                <span>استخراج القوة 🔱</span>
            </button>
        </div>

        <div id="loader" class="hidden glass p-8 rounded-[3rem] space-y-4 animate__animated animate__fadeIn">
            <div class="w-full h-64 rounded-3xl shimmer"></div>
            <div class="h-6 w-3/4 mx-auto rounded-lg shimmer"></div>
            <div class="grid grid-cols-2 gap-4">
                <div class="h-12 rounded-xl shimmer"></div>
                <div class="h-12 rounded-xl shimmer"></div>
            </div>
        </div>

        <div id="result" class="hidden glass p-8 rounded-[3rem] animate__animated animate__fadeInUp shadow-2xl">
            <div class="relative rounded-3xl overflow-hidden mb-6 group">
                <img id="cover" class="w-full h-80 object-cover transform group-hover:scale-110 transition-transform duration-700">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent flex flex-col justify-end p-6">
                    <h3 id="title" class="text-white font-bold text-xl mb-4 line-clamp-2"></h3>
                    
                    <div class="flex justify-between items-center text-xs font-bold text-gray-300 border-t border-white/10 pt-4">
                        <div class="flex items-center gap-1"><i class="fa-solid fa-play text-blue-400"></i> <span id="views">0</span></div>
                        <div class="flex items-center gap-1"><i class="fa-solid fa-heart text-red-500"></i> <span id="likes">0</span></div>
                        <div class="flex items-center gap-1"><i class="fa-solid fa-comment text-green-400"></i> <span id="comments">0</span></div>
                        <div class="flex items-center gap-1"><i class="fa-solid fa-share text-purple-400"></i> <span id="shares">0</span></div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <a id="hd" class="flex items-center justify-center gap-2 bg-gradient-to-r from-emerald-600 to-teal-600 p-4 rounded-2xl font-black hover:opacity-90 transition-all text-white no-underline shadow-lg">
                    <i class="fa-solid fa-cloud-arrow-down"></i> جودة HD
                </a>
                <a id="sd" class="flex items-center justify-center gap-2 bg-gradient-to-r from-blue-600 to-indigo-600 p-4 rounded-2xl font-black hover:opacity-90 transition-all text-white no-underline shadow-lg">
                    <i class="fa-solid fa-download"></i> جودة SD
                </a>
                <a id="mp3" class="flex items-center justify-center gap-2 bg-gradient-to-r from-purple-600 to-pink-600 p-4 rounded-2xl font-black hover:opacity-90 transition-all text-white no-underline sm:col-span-2 shadow-lg">
                    <i class="fa-solid fa-music"></i> تحميل الصوت MP3
                </a>
            </div>
        </div>
    </div>

    <footer class="mt-12 text-gray-500 text-[10px] font-black tracking-[0.6em] uppercase animate__animated animate__fadeIn">
        Designed by Wizzy Sovereign © 2026
    </footer>

    <script>
        const Toast = Swal.mixin({
            toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, timerProgressBar: true,
            background: '#0f172a', color: '#fff'
        });

        async function getDownload() {
            const urlInput = document.getElementById('url').value;
            const btn = document.getElementById('btn');
            const loader = document.getElementById('loader');
            const result = document.getElementById('result');
            
            if(!urlInput) {
                return Swal.fire({ icon: 'warning', title: 'يا ملك!', text: 'الرابط مفقود في الخانة السيادية', confirmButtonColor: '#3b82f6', background: '#0f172a', color: '#fff' });
            }

            // UI State
            btn.disabled = true;
            result.classList.add('hidden');
            loader.classList.remove('hidden');

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: urlInput})
                });
                const res = await response.json();
                
                if(res.success) {
                    const d = res.data;
                    document.getElementById('cover').src = d.cover;
                    document.getElementById('title').innerText = d.title || "تم جلب الفيديو ⚡";
                    
                    // Stats
                    document.getElementById('views').innerText = d.play_count.toLocaleString();
                    document.getElementById('likes').innerText = d.digg_count.toLocaleString();
                    document.getElementById('comments').innerText = d.comment_count.toLocaleString();
                    document.getElementById('shares').innerText = d.share_count.toLocaleString();

                    // Links with Proxy
                    document.getElementById('hd').href = `/proxy_download?url=${encodeURIComponent(d.hdplay || d.play)}&name=Wizzy_HD_${d.id}.mp4`;
                    document.getElementById('sd').href = `/proxy_download?url=${encodeURIComponent(d.play)}&name=Wizzy_SD_${d.id}.mp4`;
                    document.getElementById('mp3').href = `/proxy_download?url=${encodeURIComponent(d.music)}&name=Wizzy_Audio_${d.id}.mp3`;
                    
                    loader.classList.add('hidden');
                    result.classList.remove('hidden');
                    Toast.fire({ icon: 'success', title: 'تم استخراج القوة السيادية بنجاح!' });
                } else {
                    throw new Error(res.message);
                }
            } catch(e) {
                loader.classList.add('hidden');
                Swal.fire({ icon: 'error', title: 'خطأ فني', text: 'المكنة واجهت مشكلة، جرب رابط آخر', background: '#0f172a', color: '#fff' });
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
