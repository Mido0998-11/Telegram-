<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔱 Wizzy Sovereign | الإمبراطورية العالمية</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { background: #020617; color: #f8fafc; font-family: 'Cairo', sans-serif; }
        .bg-mesh { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 100%); z-index: -1; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-sovereign { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); transition: 0.4s; }
        .legendary-glow { background: linear-gradient(to right, #3b82f6, #8b5cf6, #ec4899, #3b82f6); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">
    <div class="bg-mesh"></div>

    <div class="w-full max-w-2xl z-10 px-4 mt-20 flex-grow">
        <div class="text-center mb-10 animate__animated animate__fadeInDown">
            <h1 class="text-5xl md:text-6xl font-black italic"><span class="text-blue-500">WIZZY</span> <span class="text-white">SOVEREIGN</span></h1>
            <p class="text-gray-400 font-bold text-[10px] tracking-[0.5em]">The Global Power V43.0</p>
        </div>

        <div class="glass p-8 rounded-[2.5rem] mb-8 animate__animated animate__zoomIn">
            <input type="text" id="url" placeholder="انسخ الرابط الملكي هنا..." 
                   class="w-full p-5 rounded-2xl bg-black/40 border border-white/5 focus:border-blue-500 outline-none text-lg font-bold text-center mb-6">
            
            <button onclick="askChallenge()" id="btn" class="w-full btn-sovereign p-5 rounded-2xl font-black text-xl flex items-center justify-center gap-3">
                <i class="fa-solid fa-shield-check"></i>
                <span>تحقق سيادي واستخراج 🔱</span>
            </button>
        </div>

        <div id="result" class="hidden glass p-6 rounded-[2.5rem] animate__animated animate__fadeInUp mb-10">
            <div class="relative rounded-3xl overflow-hidden mb-6">
                <img id="cover" class="w-full h-72 object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black p-6 flex flex-col justify-end">
                    <h3 id="title" class="text-white font-bold text-lg mb-2 truncate"></h3>
                </div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <a id="hd" class="bg-emerald-600 p-4 rounded-xl font-black text-center text-white no-underline">تحميل HD 💎</a>
                <a id="sd" class="bg-blue-600 p-4 rounded-xl font-black text-center text-white no-underline">تحميل SD 🎬</a>
                <a id="mp3" class="bg-purple-600 p-4 rounded-xl font-black text-center text-white no-underline sm:col-span-2">تحميل MP3 🎵</a>
            </div>
        </div>
    </div>

    <footer class="w-full glass py-10 mt-20 text-center">
        <p class="legendary-glow text-[12px] tracking-[0.4em]">DESIGNED & DEVELOPED BY WIZZY SOVEREIGN © 2026</p>
    </footer>

    <script>
        // الخطوة 1: طلب السؤال من السيرفر
        async function askChallenge() {
            const url = document.getElementById('url').value;
            if(!url) return Swal.fire({ icon: 'warning', title: 'عذراً!', text: 'ضع الرابط أولاً يا ملك', background: '#0f172a', color: '#fff' });

            const res = await fetch('/api/get_challenge');
            const data = await res.json();

            // إظهار نافذة التحقق الحقيقية
            const { value: answer } = await Swal.fire({
                title: 'تحقق بشري (سيرفر)',
                text: data.question,
                input: 'number',
                inputPlaceholder: 'اكتب النتيجة هنا...',
                showCancelButton: true,
                confirmButtonText: 'تأكيد الإجابة ✅',
                background: '#0f172a',
                color: '#fff',
                inputAttributes: { autocapitalize: 'off', autofocus: 'on' }
            });

            if (answer) {
                getDownload(answer); // إرسال الإجابة للسيرفر للتحقق
            }
        }

        // الخطوة 2: إرسال الرابط والإجابة للسيرفر
        async function getDownload(answer) {
            Swal.fire({ title: 'جاري التحقق والاستخراج...', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#0f172a', color: '#fff' });

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: document.getElementById('url').value, answer: answer})
                });
                const res = await response.json();
                
                if(res.success) {
                    const d = res.data;
                    document.getElementById('result').classList.remove('hidden');
                    document.getElementById('cover').src = d.cover;
                    document.getElementById('title').innerText = d.title || "تم الاستخراج ⚡";
                    document.getElementById('hd').href = `/proxy_download?url=${encodeURIComponent(d.hdplay || d.play)}&name=Wizzy_HD.mp4`;
                    document.getElementById('sd').href = `/proxy_download?url=${encodeURIComponent(d.play)}&name=Wizzy_SD.mp4`;
                    document.getElementById('mp3').href = `/proxy_download?url=${encodeURIComponent(d.music)}&name=Wizzy_Audio.mp3`;
                    Swal.close();
                } else {
                    Swal.fire({ icon: 'error', title: 'فشل التحقق!', text: res.message, background: '#0f172a', color: '#fff' });
                }
            } catch(e) {
                Swal.fire({ icon: 'error', title: 'خطأ!', text: 'حدثت مشكلة في الاتصال', background: '#0f172a', color: '#fff' });
            }
        }
    </script>
</body>
</html>
