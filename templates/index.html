<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔱 Wizzy Sovereign | الإمبراطورية العالمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { background: #020617; color: #f8fafc; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        .sovereign-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(59, 130, 246, 0.2); border-radius: 2rem; }
        .glow-button { transition: 0.3s; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .glow-button:hover { box-shadow: 0 0 30px rgba(59, 130, 246, 0.8); transform: translateY(-2px); }
        .gradient-text { background: linear-gradient(to right, #60a5fa, #c084fc, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200% auto; animation: shine 3s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-blue-900/20 via-slate-950 to-black">

    <div class="text-center mb-10 animate__animated animate__fadeInDown">
        <h1 class="text-6xl font-black gradient-text mb-4">WIZZY SOVEREIGN</h1>
        <p class="text-blue-400 font-bold tracking-widest text-sm">V37.0 LEGENDARY EDITION</p>
    </div>

    <div class="max-w-2xl w-full sovereign-card p-8 shadow-2xl animate__animated animate__zoomIn">
        <div class="relative group">
            <input type="text" id="url" placeholder="ضع رابط الإبداع هنا..." 
                   class="w-full p-5 rounded-2xl bg-black/40 border-2 border-slate-700 focus:border-blue-500 outline-none transition-all text-center text-lg placeholder-gray-500 font-bold">
        </div>
        
        <button onclick="getDownload()" id="btn" class="w-full mt-6 glow-button bg-blue-600 hover:bg-blue-500 text-white p-5 rounded-2xl font-black text-xl flex items-center justify-center gap-3">
            <span>استخراج القوة السيادية</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
        </button>

        <div id="result" class="mt-10 hidden animate__animated animate__fadeInUp">
            <div class="relative group mb-6">
                <img id="cover" class="w-full h-64 object-cover rounded-3xl shadow-2xl border-2 border-blue-500/20">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent rounded-3xl flex items-end p-6">
                    <h3 id="title" class="text-white font-bold text-lg truncate w-full"></h3>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <a id="hd" target="_blank" class="flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-500 p-4 rounded-xl font-bold transition-all shadow-lg text-white no-underline">
                    <span>تحميل HD 💎</span>
                </a>
                <a id="sd" target="_blank" class="flex items-center justify-center gap-2 bg-blue-700 hover:bg-blue-600 p-4 rounded-xl font-bold transition-all shadow-lg text-white no-underline">
                    <span>تحميل عادى 🎬</span>
                </a>
                <a id="mp3" target="_blank" class="flex items-center justify-center gap-2 bg-purple-600 hover:bg-purple-500 p-4 rounded-xl font-bold transition-all shadow-lg text-white no-underline md:col-span-2">
                    <span>تحميل الصوت MP3 🎵</span>
                </a>
            </div>
        </div>
    </div>

    <footer class="mt-12 text-gray-500 text-xs font-bold tracking-widest animate__animated animate__fadeIn">
        BY WIZZY SOVEREIGN © 2026 | THE GLOBAL PLATFORM
    </footer>

    <script>
        async function getDownload() {
            const urlInput = document.getElementById('url').value;
            const btn = document.getElementById('btn');
            const resultDiv = document.getElementById('result');
            
            if(!urlInput) return alert("يا ملك، حط الرابط أولاً! 🔱");
            
            btn.disabled = true;
            btn.innerHTML = '<span class="animate-spin">🌀</span> جاري استخراج البيانات...';
            
            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: urlInput})
                });
                const res = await response.json();
                
                if(res.success) {
                    resultDiv.classList.remove('hidden');
                    document.getElementById('cover').src = res.data.cover;
                    document.getElementById('title').innerText = res.data.title || "تم استخراج الفيديو بنجاح ✅";
                    document.getElementById('hd').href = res.data.hdplay || res.data.play;
                    document.getElementById('sd').href = res.data.play;
                    document.getElementById('mp3').href = res.data.music;
                    
                    // التمرير التلقائي للنتيجة
                    resultDiv.scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert("عذراً: " + res.message);
                }
            } catch(e) {
                alert("حدث خطأ في الاتصال بالسيرفر العالمي");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>استخراج القوة السيادية</span><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>';
            }
        }
    </script>
</body>
</html>
