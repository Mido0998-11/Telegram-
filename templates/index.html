<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔱 Wizzy Sovereign | TikTok Downloader</title>
    
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" type="image/x-icon">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        :root { --tiktok-cyan: #00f2ea; --tiktok-pink: #ff0050; }

        body { background: #000; color: #fff; font-family: 'Cairo', sans-serif; overflow-x: hidden; }

        /* الزخرفة الخلفية المتحركة */
        .bg-glow {
            position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0, 242, 234, 0.08) 0%, transparent 70%);
            filter: blur(100px); border-radius: 50%; z-index: -1; animation: move 20s infinite alternate;
        }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(20%, 20%); } }

        /* البطاقة السيادية مع تأثير Border-Beam */
        .sovereign-card {
            position: relative; background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(30px);
            border-radius: 3rem; border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sovereign-card::before {
            content: ''; position: absolute; inset: 0; padding: 2px; border-radius: 3rem;
            background: linear-gradient(90deg, transparent, var(--tiktok-cyan), var(--tiktok-pink), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude; background-size: 200% auto; animation: beam 4s linear infinite;
            pointer-events: none;
        }
        @keyframes beam { to { background-position: 200% center; } }

        .btn-elite {
            background: linear-gradient(90deg, var(--tiktok-pink), var(--tiktok-cyan));
            color: #000; font-weight: 900; transition: 0.4s; position: relative; z-index: 10;
        }
        .btn-elite:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(0, 242, 234, 0.5); }

        .nav-link {
            background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 15px;
            font-weight: bold; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-link:hover { background: var(--tiktok-cyan); color: #000; }

        .legendary-glow {
            background: linear-gradient(to right, var(--tiktok-pink), var(--tiktok-cyan), #fff, var(--tiktok-pink));
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite; font-weight: 900;
        }
        @keyframes shine { to { background-position: 200% center; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">
    <div class="bg-glow" style="top: -200px; left: -200px;"></div>

    <div class="w-full max-w-2xl z-10">
        
        <div class="w-full flex justify-between items-center mt-6 mb-10 animate__animated animate__fadeIn">
            <h2 class="text-sm font-black tracking-widest text-gray-500 uppercase italic">Sovereign V50</h2>
            <a href="/search" class="nav-link text-[var(--tiktok-cyan)] no-underline">
                <i class="fa-solid fa-magnifying-glass ml-2"></i> اكتشف وفيديوهات
            </a>
        </div>

        <div class="text-center mb-12 animate__animated animate__fadeInDown">
            <div class="flex items-center justify-center gap-4 mb-3">
                <i class="fa-brands fa-tiktok text-5xl text-[var(--tiktok-cyan)]"></i>
                <h1 class="text-5xl md:text-6xl font-black italic tracking-tighter">
                    WIZZY <span class="text-[var(--tiktok-pink)]">TIKTOK</span>
                </h1>
            </div>
            <p class="text-gray-500 font-bold text-[10px] tracking-[0.5em] uppercase italic">The Ultimate Extraction Engine</p>
        </div>

        <div class="sovereign-card p-10 animate__animated animate__zoomIn shadow-2xl mb-12">
            <div class="text-center mb-8">
                <span class="bg-white/5 border border-white/10 px-5 py-2 rounded-full text-[10px] font-black text-[#00f2ea] uppercase tracking-widest italic">Ready for Download</span>
            </div>

            <input type="text" id="url" placeholder="ضع رابط الإبداع (TikTok) هنا..." 
                   class="w-full p-6 rounded-3xl bg-white/5 border border-white/5 outline-none text-xl font-bold text-center mb-8 focus:border-[#00f2ea] transition-all relative z-10 placeholder-gray-700">
            
            <button onclick="startDownload()" id="btn" class="w-full btn-elite p-6 rounded-3xl text-2xl flex items-center justify-center gap-3 relative z-10">
                <i class="fa-solid fa-bolt-lightning"></i>
                <span>استخراج القوة السيادية 🔱</span>
            </button>
        </div>

        <div id="result" class="hidden sovereign-card p-8 animate__animated animate__fadeInUp shadow-2xl mb-20 relative z-10">
            <div class="relative rounded-[2.5rem] overflow-hidden mb-6 border border-white/10">
                <img id="cover" class="w-full h-80 object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent flex flex-col justify-end p-8">
                    <h3 id="title" class="text-white font-black text-xl mb-6 truncate px-2"></h3>
                    <div class="flex justify-between items-center text-xs font-bold text-gray-400 border-t border-white/10 pt-5">
                        <div class="flex items-center gap-2"><i class="fa-solid fa-play text-[#00f2ea]"></i> <span id="views">0</span></div>
                        <div class="flex items-center gap-2"><i class="fa-solid fa-heart text-[#ff0050]"></i> <span id="likes">0</span></div>
                        <div class="flex items-center gap-2"><i class="fa-solid fa-share text-blue-400"></i> <span id="shares">0</span></div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <a id="hd" onclick="showNotify('فيديو HD')" class="bg-[#00f2ea] text-black p-5 rounded-2xl font-black text-center no-underline flex items-center justify-center gap-2 hover:brightness-110 transition-all">
                    <i class="fa-solid fa-cloud-arrow-down"></i> تحميل فيديو HD
                </a>
                <a id="mp3" onclick="showNotify('ملف MP3')" class="bg-[#ff0050] text-white p-5 rounded-2xl font-black text-center no-underline flex items-center justify-center gap-2 hover:brightness-110 transition-all sm:col-span-2">
                    <i class="fa-solid fa-music"></i> تحميل الصوت MP3
                </a>
            </div>
        </div>
    </div>

    <footer class="mt-auto py-12 text-center w-full bg-black/40 backdrop-blur-md border-t border-white/5">
        <div class="mb-3">
             <span class="legendary-glow text-xl tracking-widest uppercase">Wizzy Sovereign Empire</span>
        </div>
        <p class="text-[9px] text-gray-600 font-black tracking-[0.4em] uppercase">
            Designed & Developed by Wizzy God-Tier © 2026
        </p>
    </footer>

    <script>
        // --- الجزء المضاف للربط مع البحث ---
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.has('url')) {
                const videoUrl = urlParams.get('url');
                document.getElementById('url').value = videoUrl;
                // تأخير بسيط لضمان تحميل الصفحة ثم البدء
                setTimeout(() => { startDownload(); }, 500);
            }
        }

        function showNotify(type) {
            Swal.fire({
                toast: true, position: 'top-end', icon: 'info',
                title: `جاري بدء تحميل ${type} الآن يا ملك 🚀`,
                showConfirmButton: false, timer: 4000, timerProgressBar: true,
                background: '#0a0a0a', color: '#fff'
            });
        }

        async function startDownload() {
            const urlInput = document.getElementById('url').value;
            if(!urlInput) return Swal.fire({ icon: 'error', title: 'عذراً!', text: 'الرابط مفقود في الخانة الملكية', background: '#0a0a0a', color: '#fff' });

            Swal.fire({ title: 'جاري استخراج القوة...', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#0a0a0a', color: '#fff' });

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: urlInput})
                });
                const res = await response.json();
                
                if(res.success) {
                    const d = res.data;
                    document.getElementById('result').classList.remove('hidden');
                    document.getElementById('cover').src = d.cover;
                    document.getElementById('title').innerText = d.title || "Wizzy TikTok Video";
                    document.getElementById('views').innerText = d.play_count.toLocaleString();
                    document.getElementById('likes').innerText = d.digg_count.toLocaleString();
                    document.getElementById('shares').innerText = d.share_count.toLocaleString();

                    document.getElementById('hd').href = `/proxy_download?url=${encodeURIComponent(d.hdplay || d.play)}&name=Wizzy_HD.mp4`;
                    document.getElementById('mp3').href = `/proxy_download?url=${encodeURIComponent(d.music)}&name=Wizzy_Audio.mp3`;
                    
                    Swal.close();
                    window.scrollTo({ top: document.getElementById('result').offsetTop - 30, behavior: 'smooth' });
                } else {
                    Swal.fire({ icon: 'error', title: 'فشل العملية', text: res.message, background: '#0a0a0a', color: '#fff' });
                }
            } catch(e) {
                Swal.fire({ icon: 'error', title: 'خطأ عالمي', text: 'مشكلة في الاتصال بالسيرفر 🛠️', background: '#0a0a0a', color: '#fff' });
            }
        }
    </script>
</body>
</html>
