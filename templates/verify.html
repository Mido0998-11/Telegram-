<script>
    async function runVerify() {
        const box = document.getElementById('check-box');
        const text = document.getElementById('v-text');
        
        box.innerHTML = '<div class="spinner"></div>';
        box.style.border = 'none';
        text.innerText = 'جاري توثيق السيادة...';
        
        try {
            // إرسال الطلب للسيرفر
            const response = await fetch('/api/verify_success', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                cache: 'no-cache' // منع الكاش
            });
            
            const data = await response.json();

            if (data.success) {
                setTimeout(() => {
                    box.innerHTML = '<i class="fa-solid fa-check text-[#00f2ea] text-xl"></i>';
                    text.innerText = 'تم التوثيق بنجاح ✅';
                    
                    // الحركة السحرية: الانتقال الإجباري
                    setTimeout(() => {
                        window.location.replace('/downloader'); // استخدام replace بدلاً من href
                    }, 800);
                }, 1500);
            }
        } catch (error) {
            box.style.border = '2px solid red';
            text.innerText = 'خطأ في الاتصال، حاول ثانية';
        }
    }
</script>
