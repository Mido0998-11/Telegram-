<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔱 Sovereign Verification | بوابة العبور</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: screen; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2rem; }
        .spinner { width: 30px; height: 30px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #00f2ea; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen bg-[#020617]">
    <div class="w-full max-w-md p-8 glass text-center animate_animated animate_fadeIn">
        <i class="fa-solid fa-shield-halved text-5xl text-[#00f2ea] mb-6"></i>
        <h1 class="text-2xl font-black mb-2 tracking-widest">WIZZY SOVEREIGN</h1>
        <p class="text-gray-500 text-sm mb-8">نظام الحماية العالمي: يرجى التحقق من بشريتك للوصول للمنصة</p>
        
        <div id="verify-btn" onclick="runVerify()" class="border border-white/10 p-6 rounded-2xl cursor-pointer hover:bg-white/5 transition-all flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div id="check-box" class="w-7 h-7 border-2 border-gray-600 rounded-md"></div>
                <span id="v-text" class="text-lg font-bold">أنا لست برنامج روبوت</span>
            </div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/ad/RecaptchaLogo.svg" class="w-8 opacity-40">
        </div>
    </div>

    <script>
        function runVerify() {
            const box = document.getElementById('check-box');
            const text = document.getElementById('v-text');
            box.innerHTML = '<div class="spinner"></div>';
            box.style.border = 'none';
            
            setTimeout(async () => {
                box.innerHTML = '<i class="fa-solid fa-check text-[#00f2ea] text-xl"></i>';
                text.innerText = 'تم التحقق بنجاح ✅';
                
                await fetch('/api/set_verified', {method: 'POST'});
                setTimeout(() => { window.location.href = '/downloader'; }, 1000);
            }, 2000);
        }
    </script>
</body>
</html>
