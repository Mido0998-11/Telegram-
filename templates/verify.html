<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔱 Sovereign Verification | بوابة العبور</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { background: #010101; color: #fff; font-family: 'Cairo', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        /* زخرفة نيون خلفية */
        .bg-glow { position: fixed; width: 400px; height: 400px; background: rgba(0, 242, 234, 0.1); filter: blur(100px); border-radius: 50%; z-index: -1; }
        
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 2.5rem; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        
        .spinner { width: 26px; height: 26px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #00f2ea; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .verify-btn-container { border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); transition: 0.4s; }
        .verify-btn-container:hover { background: rgba(255,255,255,0.08); border-color: #00f2ea; transform: translateY(-2px); }
    </style>
</head>
<body class="bg-[#020617]">
    <div class="bg-glow" style="top: -100px; left: -100px;"></div>
    <div class="bg-glow" style="bottom: -100px; right: -100px; background: rgba(255, 0, 80, 0.1);"></div>

    <div class="w-full max-w-md p-10 glass text-center animate__animated animate__zoomIn">
        <div class="mb-8">
            <i class="fa-solid fa-shield-halved text-6xl text-[#00f2ea] mb-4 animate__pulse animate__infinite"></i>
            <h1 class="text-3xl font-black tracking-tighter mb-2 italic">WIZZY <span class="text-[#ff0050]">SOVEREIGN</span></h1>
            <p class="text-gray-500 text-xs font-bold tracking-widest uppercase">نظام الحماية العالمي للفحص الرقمي</p>
        </div>
        
        <div id="verify-action" onclick="runVerify()" class="verify-btn-container p-6 rounded-[1.5rem] cursor-pointer flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div id="check-box" class="w-7 h-7 border-2 border-gray-700 rounded-md flex items-center justify-center transition-all"></div>
                <span id="v-text" class="text-lg font-bold text-gray-300">أنا لست برنامج روبوت</span>
            </div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/ad/RecaptchaLogo.svg" class="w-7 opacity-30">
        </div>

        <p class="mt-8 text-[10px] text-gray-600 font-bold uppercase tracking-[0.3em]">Authorized Access Only © 2026</p>
    </div>

    <script>
        async function runVerify() {
            const box = document.getElementById('check-box');
            const text = document.getElementById('v-text');
            
            // 1. بدء الأنيميشن
            box.innerHTML = '<div class="spinner"></div>';
            box.style.border = 'none';
            text.innerText = 'جاري فحص السيادة...';
            
            try {
                // 2. الاتصال بالسيرفر لإعطاء تذكرة العبور (المسار الصحيح)
                const response = await fetch('/api/verify_success', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const data = await response.json();

                if (data.success) {
                    // 3. نجاح التحقق بصرياً
                    setTimeout(() => {
                        box.innerHTML = '<i class="fa-solid fa-check text-[#00f2ea] text-xl"></i>';
                        text.innerText = 'تم التحقق بنجاح يا ملك ✅';
                        
                        // 4. الانتقال لصفحة التحميل بعد ثانية واحدة
                        setTimeout(() => {
                            window.location.href = '/downloader';
                        }, 1000);
                    }, 1500);
                } else {
                    throw new Error("فشل في السيرفر");
                }
            } catch (error) {
                // في حالة الخطأ، نرجع الوضع كما كان
                box.innerHTML = '';
                box.style.border = '2px solid red';
                text.innerText = 'فشل التحقق، أعد المحاولة 🛠️';
            }
        }
    </script>
</body>
</html>
