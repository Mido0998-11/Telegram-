<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔱 Wizzy Sovereign Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: #e5e5e5; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(45deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-xl w-full glass p-8 rounded-3xl shadow-2xl text-center">
        <h1 class="text-4xl font-black mb-2 gradient-text">WIZZY SOVEREIGN</h1>
        <p class="text-gray-400 mb-8">المنصة العالمية لتحميل محتوى تيك توك</p>
        
        <input type="text" id="url" placeholder="ضع رابط الفيديو هنا..." 
               class="w-full p-4 rounded-xl bg-black/50 border border-gray-700 focus:border-blue-500 outline-none mb-4 text-center">
        
        <button onclick="getDownload()" id="btn" class="w-full bg-blue-600 hover:bg-blue-700 p-4 rounded-xl font-bold transition-all transform active:scale-95">
            استخراج الروابط 🚀
        </button>

        <div id="result" class="mt-8 hidden animate-fade-in">
            <img id="cover" class="w-48 h-48 mx-auto rounded-2xl mb-4 object-cover border-4 border-blue-500/30 shadow-lg">
            <h3 id="title" class="text-sm mb-6 px-4 truncate text-gray-300"></h3>
            <div class="grid grid-cols-1 gap-3">
                <a id="hd" target="_blank" class="bg-green-600 p-3 rounded-lg font-bold text-sm hover:opacity-80">تحميل بجودة HD 🎥</a>
                <a id="sd" target="_blank" class="bg-blue-600 p-3 rounded-lg font-bold text-sm hover:opacity-80">تحميل بجودة SD 🎬</a>
                <a id="mp3" target="_blank" class="bg-purple-600 p-3 rounded-lg font-bold text-sm hover:opacity-80">تحميل بصيغة MP3 🎵</a>
            </div>
        </div>
    </div>

    <script>
        async function getDownload() {
            const urlInput = document.getElementById('url').value;
            const btn = document.getElementById('btn');
            btn.innerText = "جاري التحليل... ⏳";
            
            const response = await fetch('/api/download', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url: urlInput})
            });
            const res = await response.json();
            
            btn.innerText = "استخراج الروابط 🚀";
            if(res.success) {
                document.getElementById('result').classList.remove('hidden');
                document.getElementById('cover').src = res.data.cover;
                document.getElementById('title').innerText = res.data.title || "تم استخراج البيانات ✅";
                document.getElementById('hd').href = res.data.hdplay || res.data.play;
                document.getElementById('sd').href = res.data.play;
                document.getElementById('mp3').href = res.data.music;
            } else {
                alert(res.message);
            }
        }
    </script>
</body>
</html>
